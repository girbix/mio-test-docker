<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC - Nuovo Incident (Cliente)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="header">
        <h1>Nuovo Incident</h1>
        <div class="red-line"></div>
        <div class="user-info">
            <span id="loggedUser"></span> | <a href="#" id="logoutLink">Logout</a>
        </div>
        <button id="themeToggle" class="theme-btn" aria-label="Cambia tema">🌓</button>
    </div>

    <div class="container two-column">
        <form id="incidentForm">
            <!-- Colonna sinistra -->
            <div class="left-column">
                <div class="form-group required">
                    <label for="requestedBy">Requested by</label>
                    <input type="text" id="requestedBy" name="requestedBy" required readonly>
                </div>
                <div class="form-group required">
                    <label for="service">Service</label>
                    <input type="text" id="service" name="service" list="service-list" required placeholder="Seleziona o digita">
                    <datalist id="service-list"></datalist>
                </div>
                <div class="form-group required">
                    <label for="shortDescription">Short Description</label>
                    <textarea id="shortDescription" name="shortDescription" rows="2" required></textarea>
                </div>
            </div>

            <!-- Colonna destra -->
            <div class="right-column">
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" list="location-list" placeholder="Seleziona o digita">
                    <datalist id="location-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="serviceOffering">Service Offering</label>
                    <input type="text" id="serviceOffering" name="serviceOffering" list="offering-list" placeholder="Seleziona o digita">
                    <datalist id="offering-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="ci">Configuration Item (CI)</label>
                    <input type="text" id="ci" name="ci" list="ci-list" placeholder="Seleziona o digita">
                    <datalist id="ci-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="urgency">Urgency</label>
                    <select id="urgency" name="urgency">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="impact">Impact</label>
                    <select id="impact" name="impact">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="contract">Contract</label>
                    <input type="text" id="contract" name="contract" placeholder="Numero contratto">
                </div>
            </div>

            <div class="full-width">
                <button type="submit" class="btn-primary">Invia Incident</button>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
