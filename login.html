<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - NOC System</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 8px; border-top: 4px solid #811d1d; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; border: 1px solid #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #811d1d; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>NOC Access</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email (es: giovanni.culotta@noc.it)" required>
            <input type="password" id="password" placeholder="Password (123)" required>
            <button type="submit">ACCEDI</button>
        </form>
    </div>
    <script>
        const users = {
            "giovanni.culotta@noc.it": { pwd: "123", role: "client", name: "G. Culotta" },
            "tecnico.noc@it.it": { pwd: "123", role: "tech", name: "Admin NOC" }
        };
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const u = users[document.getElementById('email').value];
            if (u && u.pwd === document.getElementById('password').value) {
                localStorage.setItem('user', JSON.stringify(u));
                window.location.href = u.role === 'client' ? 'client.html' : 'tech.html';
            } else { alert("Credenziali errate!"); }
        };
    </script>
</body>
</html>
