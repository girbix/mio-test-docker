<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Workspace Tecnico</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; }
        header { background: #000; padding: 15px; border-bottom: 2px solid #811d1d; }
        .container { padding: 20px; }
        .tabs { display: flex; gap: 5px; }
        .tab { background: #333; padding: 10px 20px; cursor: pointer; border: 1px solid #444; }
        .active { background: #1e1e1e; border-bottom: 2px solid #811d1d; }
        .content { background: #1e1e1e; padding: 20px; border: 1px solid #444; }
        textarea { width: 100%; background: #2a2a2a; color: white; border: 1px solid #333; margin: 10px 0; }
    </style>
</head>
<body>
    <header>NOC Workspace - Tecnico L2</header>
    <div class="container">
        <div class="tabs">
            <div class="tab active">Pianificazione</div>
            <div class="tab">Note Interne</div>
            <div class="tab" style="color:#ff4d4d">Chiusura & RCA</div>
        </div>
        <div class="content">
            <label>Giustificazione</label>
            <textarea rows="3"></textarea>
            <label>Piano di Implementazione</label>
            <textarea rows="3"></textarea>
            <label>Analisi del Rischio (ISO 27001)</label>
            <textarea rows="3"></textarea>
            <button style="background:#811d1d; color:white; border:none; padding:10px; cursor:pointer;">SALVA MODIFICHE</button>
        </div>
    </div>
</body>
</html>
