<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC - Operations Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="header">
        <h1>NOC Operations Dashboard</h1>
        <div class="red-line"></div>
        <div class="user-info">
            <span id="loggedUser"></span> | <a href="#" id="logoutLink">Logout</a>
        </div>
        <button id="themeToggle" class="theme-btn" aria-label="Cambia tema">🌓</button>
    </div>

    <div class="container">
        <!-- Contatori stile NOC -->
        <div class="stats-cards">
            <div class="stat-card">
                <span class="stat-label">Open</span>
                <span class="stat-value" id="openTickets">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">In Progress</span>
                <span class="stat-value" id="inProgressTickets">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Critical SLA</span>
                <span class="stat-value" id="criticalSLA">0</span>
            </div>
        </div>

        <!-- Tabella ticket attivi (Incident e Change) -->
        <h3>Ticket attivi</h3>
        <table class="ticket-table" id="activeTicketsTable">
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Numero</th>
                    <th>Short description</th>
                    <th>Stato</th>
                    <th>Priorità</th>
                    <th>Team</th>
                    <th>Assegnato a</th>
                    <th>Aperto il</th>
                </tr>
            </thead>
            <tbody id="ticketList"></tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
